name: Update Daily Food Deals

on:
  schedule:
    # Runs daily at 13:00 UTC (6:00 AM PDT)
    - cron: '0 13 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'promotions.json'
      - 'update_deals.py'
      - 'requirements.txt'
      - '.github/workflows/update-deals.yml'

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Deals Tracker
        # On schedule / manual runs, refresh deals. On UI-only pushes, still regenerate
        # so active_deals.json stays in sync before publishing.
        run: python update_deals.py

      - name: Commit Updated Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/active_deals.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update active deals [skip ci]" && git push)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # Force-publish so Pages always mirrors ./public on the gh-pages branch
          force_orphan: true
