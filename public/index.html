<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Sports Food Deals</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --tag-bg: #0284c7;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #0284c7;
            --border: #e2e8f0;
            --tag-bg: #0369a1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text-primary); padding: 2rem 1rem; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        h1 { font-size: 1.8rem; font-weight: 700; }
        
        .controls { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
        input, select, button { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); font-size: 0.95rem; }
        input { flex: 1; min-width: 200px; }
        button { cursor: pointer; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .restaurant { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .badge { background: var(--tag-bg); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.5rem; border-radius: 6px; text-transform: uppercase; }
        
        .reward { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
        .details { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .details p { margin-bottom: 0.4rem; }
        
        .code-box { background: rgba(0,0,0,0.2); padding: 0.4rem 0.6rem; border-radius: 4px; font-family: monospace; font-size: 0.95rem; color: var(--accent); display: inline-block; }
        .link-btn { display: inline-block; text-decoration: none; color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem; }
        
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); grid-column: 1 / -1; }
        .timestamp { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏆 Sports Food Deals Tracker</h1>
                <div class="timestamp" id="timestamp">Loading updates...</div>
            </div>
            <button onclick="toggleTheme()">Toggle Theme</button>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search team or restaurant..." oninput="filterDeals()">
            <select id="leagueSelect" onchange="filterDeals()">
                <option value="all">All Leagues</option>
                <option value="mlb">MLB</option>
                <option value="nba">NBA</option>
                <option value="mls">MLS</option>
            </select>
        </div>

        <div class="grid" id="dealsGrid"></div>
    </div>

    <script>
        let allDeals = [];

        async function loadDeals() {
            try {
                const res = await fetch('active_deals.json');
                const data = await res.json();
                allDeals = data.deals || [];
                document.getElementById('timestamp').innerText = `Last Updated: ${data.last_updated || 'N/A'}`;
                renderDeals(allDeals);
            } catch (err) {
                document.getElementById('dealsGrid').innerHTML = `
                    <div class="empty-state">
                        <h2>No deals updated yet</h2>
                        <p>The daily checker runs automatically every morning.</p>
                    </div>`;
            }
        }

        function renderDeals(deals) {
            const grid = document.getElementById('dealsGrid');
            if (deals.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No active promotions found for today. Check back tomorrow!</h3></div>';
                return;
            }

            grid.innerHTML = deals.map(d => `
                <div class="card">
                    <div>
                        <div class="card-header">
                            <div class="restaurant">${escapeHtml(d.restaurant)}</div>
                            <span class="badge">${escapeHtml(d.league)}</span>
                        </div>
                        <div class="reward">${escapeHtml(d.reward)}</div>
                        <div class="details">
                            <p><strong>Team:</strong> ${escapeHtml(d.team)}</p>
                            <p><strong>Triggered By:</strong> ${escapeHtml(d.activated_by || 'Game Performance')}</p>
                            <p><strong>Redeem Via:</strong> ${escapeHtml(d.redemption_method)}</p>
                            <p><strong>Window:</strong> ${escapeHtml(d.redemption_window)}</p>
                            ${d.coupon_code ? `<p><strong>Code:</strong> <span class="code-box">${escapeHtml(d.coupon_code)}</span></p>` : ''}
                        </div>
                    </div>
                    ${d.source ? `<a href="${escapeHtml(d.source)}" target="_blank" rel="noopener" class="link-btn">Official Promo Terms →</a>` : ''}
                </div>
            `).join('');
        }

        function filterDeals() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const league = document.getElementById('leagueSelect').value;

            const filtered = allDeals.filter(d => {
                const matchesSearch = d.team.toLowerCase().includes(search) || d.restaurant.toLowerCase().includes(search);
                const matchesLeague = league === 'all' || d.league.toLowerCase() === league;
                return matchesSearch && matchesLeague;
            });

            renderDeals(filtered);
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        loadDeals();
    </script>
</body>
</html>
